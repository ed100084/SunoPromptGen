function MultiSelectChips({ options, selected, onChange, color = "indigo" }) {
  const colorClass = {
    indigo: "bg-indigo-600 text-white",
    rose: "bg-rose-600 text-white",
    emerald: "bg-emerald-600 text-white",
    amber: "bg-amber-600 text-white",
    sky: "bg-sky-600 text-white",
    slate: "bg-slate-700 text-white",
    red: "bg-red-600 text-white"
  }[color];

  return (
    <div className="flex flex-wrap gap-1.5">
      {Object.keys(options).map(key => {
        const isSel = selected.includes(key);
        return (
          <button
            key={key}
            type="button"
            onClick={() => {
              onChange(isSel ? selected.filter(k => k !== key) : [...selected, key]);
            }}
            className={`tag-chip text-sm px-3 py-1.5 rounded-full border ${
              isSel ? colorClass + " border-transparent shadow-sm" : "bg-white text-slate-700 border-slate-300 hover:border-slate-400"
            }`}
          >
            {key}
          </button>
        );
      })}
    </div>
  );
}

function SingleSelect({ options, value, onChange, placeholder = "請選擇" }) {
  return (
    <select
      value={value}
      onChange={e => onChange(e.target.value)}
      className="w-full px-3 py-2 rounded-md border border-slate-300 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
    >
      <option value="">{placeholder}</option>
      {Object.keys(options).map(key => (
        <option key={key} value={key}>{key}</option>
      ))}
    </select>
  );
}

function Section({ title, children, hint }) {
  return (
    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-4">
      <h3 className="text-base font-semibold text-slate-800 mb-1 flex items-center gap-2">
        {title}
      </h3>
      {hint && <p className="text-xs text-slate-500 mb-3">{hint}</p>}
      <div className={hint ? "" : "mt-3"}>{children}</div>
    </div>
  );
}

  const applyScenario = (name) => {
    if (!name) return;
    const s = SCENARIOS[name];
    setScenario(name);
    setGenre(s.genre);
    setMoods(s.moods);
    setEnergy(s.energy);
    setInstruments(s.instruments);
    setVocals(s.vocals);
    setTextures(s.textures);
    setNegatives(s.negatives || []);
    setBpm(s.bpm);
    setMusicKey(s.key);
    setExtra(s.extra);
    setStructureName(s.structure);
    setSections(STRUCTURE_TEMPLATES[s.structure].map(x => ({ ...x })));
  };

  const applyStructure = (name) => {
    setStructureName(name);
    setSections(STRUCTURE_TEMPLATES[name].map(x => ({ ...x })));
  };

  const updateSection = (idx, field, value) => {
    setSections(prev => prev.map((s, i) => i === idx ? { ...s, [field]: value } : s));
  };

  const addSection = () => {
    setSections(prev => [...prev, { tag: "Verse", desc: "", lyrics: "" }]);
  };

  const removeSection = (idx) => {
    setSections(prev => prev.filter((_, i) => i !== idx));
  };

  const moveSection = (idx, dir) => {
    setSections(prev => {
      const next = [...prev];
      const target = idx + dir;
      if (target < 0 || target >= next.length) return next;
      [next[idx], next[target]] = [next[target], next[idx]];
      return next;
    });
  };

  /* ===========================================================
     Style Prompt 組裝（依 Suno v5.5 四層架構）
     Layer 1: Genre + tempo + key + energy
     Layer 2: Instrumentation
     Layer 3: Vocal direction（若啟用 Voice Clone 則略）
     Layer 4: Production / Textures
     + Negative constraints
     =========================================================== */
  const stylePrompt = useMemo(() => {
    const layer1 = [];
    if (genre) layer1.push(GENRES[genre] || genre);
    if (bpm) layer1.push(`${bpm} BPM`);
    if (musicKey) layer1.push(`key of ${musicKey}`);
    if (energy) layer1.push(ENERGY[energy] || energy);
    if (moods.length) layer1.push(moods.map(m => MOODS[m]).filter(Boolean).join(", "));

    const layer2 = instruments.map(i => INSTRUMENTS[i]).filter(Boolean).join(", ");

    const layer3 = voiceCloneActive
      ? ""  // 啟用 Voice Clone 時略過人聲描述（避免衝突）
      : vocals.map(v => VOCALS[v]).filter(Boolean).join(", ");

    const layer4 = textures.map(t => TEXTURES[t]).filter(Boolean).join(", ");

    const negPart = negatives.map(n => NEGATIVES[n]).filter(Boolean).join(", ");

    const cohesionPart = cohesion ? COHESION_KEYWORDS : "";

    return [layer1.join(", "), layer2, layer3, layer4, cohesionPart, extra, negPart]
      .filter(Boolean)
      .join(", ");
  }, [genre, bpm, musicKey, energy, moods, instruments, vocals, voiceCloneActive, textures, negatives, cohesion, extra]);

  const lyricsPrompt = useMemo(() => {
    return sections.map(s => {
      const tagLine = s.desc ? `[${s.tag} - ${s.desc}]` : `[${s.tag}]`;
      const body = s.lyrics.trim() || "(instrumental)";
      return `${tagLine}\n${body}`;
    }).join("\n\n");
  }, [sections]);

  const fullPrompt = useMemo(() => {
    const t = songTitle ? `Title: ${songTitle}\n\n` : "";
    return `${t}--- STYLE ---\n${stylePrompt}\n\n--- LYRICS ---\n${lyricsPrompt}`;
  }, [songTitle, stylePrompt, lyricsPrompt]);

  const copy = (text, key) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(prev => ({ ...prev, [key]: true }));
      setTimeout(() => setCopied(prev => ({ ...prev, [key]: false })), 1500);
    });
  };

  const totalLyricsChars = useMemo(() =>
    sections.reduce((sum, s) => sum + s.lyrics.length, 0)
  , [sections]);

  // 字數警示
  const styleWarn = stylePrompt.length > 1000;
  const tagCount = stylePrompt.split(",").filter(x => x.trim()).length;
  const tagWarn = tagCount > 20;

  return (
    <div className="max-w-7xl mx-auto px-4 py-6">
      <header className="mb-6">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div>
            <h1 className="text-3xl font-bold text-slate-900">Suno Prompt Generator</h1>
            <p className="text-slate-500 mt-1">v5.5 四層架構優化｜中文友善｜抗切割感</p>
          </div>
          <span className="text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full font-medium">v5.5 Optimized</span>
        </div>
      </header>

      <div className="grid grid-cols-1 lg:grid-cols-12 gap-4">
        {/* 左欄 */}
        <div className="lg:col-span-7">

          <Section title="🎯 一鍵情境範本" hint="選擇後自動填入所有欄位，再依需要微調">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
              {Object.entries(SCENARIOS).map(([name, info]) => (
                <button
                  key={name}
                  type="button"
                  onClick={() => applyScenario(name)}
                  className={`text-left p-3 rounded-lg border transition ${
                    scenario === name
                      ? "border-indigo-500 bg-indigo-50 shadow-sm"
                      : "border-slate-200 bg-white hover:border-indigo-300 hover:bg-indigo-50/50"
                  }`}
                >
                  <div className="font-medium text-sm text-slate-800">{name}</div>
                  <div className="text-xs text-slate-500 mt-1 leading-snug">{info.desc}</div>
                </button>
              ))}
            </div>
          </Section>

          <Section title="🎼 Layer 1：基本骨架（Tempo / Key / Genre / Energy）" hint="v5.5 第一層：tempo + key + 曲風 + 能量強度">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
              <div>
                <label className="text-xs text-slate-600 mb-1 block">歌曲標題（選填）</label>
                <input
                  type="text"
                  value={songTitle}
                  onChange={e => setSongTitle(e.target.value)}
                  placeholder="例：心之所向"
                  className="w-full px-3 py-2 rounded-md border border-slate-300 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                />
              </div>
              <div>
                <label className="text-xs text-slate-600 mb-1 block">曲風（建議 1-2 個 subgenre）</label>
                <SingleSelect options={GENRES} value={genre} onChange={setGenre} />
              </div>
              <div>
                <label className="text-xs text-slate-600 mb-1 block">BPM（速度）</label>
                <input
                  type="number"
                  value={bpm}
                  onChange={e => setBpm(e.target.value)}
                  min="40" max="200"
                  className="w-full px-3 py-2 rounded-md border border-slate-300 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                />
              </div>
              <div>
                <label className="text-xs text-slate-600 mb-1 block">調性 Key</label>
                <input
                  type="text"
                  value={musicKey}
                  onChange={e => setMusicKey(e.target.value)}
                  placeholder="例：C major / Am / G major"
                  className="w-full px-3 py-2 rounded-md border border-slate-300 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                />
              </div>
            </div>
            <div>
              <label className="text-xs text-slate-600 mb-1 block">能量強度</label>
              <SingleSelect options={ENERGY} value={energy} onChange={setEnergy} />
            </div>
          </Section>

          <Section title="😌 情緒（建議 1-2 個）">
            <MultiSelectChips options={MOODS} selected={moods} onChange={setMoods} color="rose" />
          </Section>

          <Section title="🎸 Layer 2：樂器配置（已含形容詞，建議 2-4 項）" hint="v5.5 對「形容詞+樂器」反應比裸樂器名更精準">
            <MultiSelectChips options={INSTRUMENTS} selected={instruments} onChange={setInstruments} color="emerald" />
          </Section>

          <Section title="🎤 Layer 3：人聲方向" hint="若使用 Voice Clone（v5.5 Pro/Premier），建議勾選下方略過人聲描述以避免衝突">
            <label className="flex items-center gap-2 mb-3 cursor-pointer select-none text-sm">
              <input
                type="checkbox"
                checked={voiceCloneActive}
                onChange={e => setVoiceCloneActive(e.target.checked)}
                className="w-4 h-4 accent-indigo-600"
              />
              <span className={voiceCloneActive ? "text-indigo-700 font-medium" : "text-slate-600"}>
                我已啟用 Voice Clone（自動略過人聲描述）
              </span>
            </label>
            {!voiceCloneActive && (
              <MultiSelectChips options={VOCALS} selected={vocals} onChange={setVocals} color="indigo" />
            )}
            {voiceCloneActive && (
              <div className="text-xs text-amber-700 bg-amber-50 p-3 rounded-lg border border-amber-200">
                Voice Clone 模式：人聲描述已略過，避免與你的音色設定衝突。剩餘字元空間將用於更多製作細節。
              </div>
            )}
          </Section>

          <Section title="🎚️ Layer 4：製作風格 / 紋理（建議 2-3 項）" hint="v5.5 對細節描述（板式殘響、貼耳收音等）反應極佳">
            <MultiSelectChips options={TEXTURES} selected={textures} onChange={setTextures} color="amber" />
          </Section>

          <Section title="🚫 Negative Prompts（v5.5 必用！建議 2-3 個）" hint="明確告訴模型不要什麼，比正向描述更能聚焦結果">
            <MultiSelectChips options={NEGATIVES} selected={negatives} onChange={setNegatives} color="red" />
          </Section>

          <Section title="✨ 抗切割感" hint="自動加入 seamless transitions 等關鍵字，明顯減少段落跳接的斷裂感">
            <label className="flex items-center gap-3 cursor-pointer select-none">
              <input
                type="checkbox"
                checked={cohesion}
                onChange={e => setCohesion(e.target.checked)}
                className="w-5 h-5 accent-indigo-600"
              />
              <span className="text-sm text-slate-700">啟用連貫性關鍵字（建議開啟）</span>
            </label>
            {cohesion && (
              <div className="mt-2 p-2 bg-indigo-50 rounded text-xs text-indigo-800 font-mono break-all">
                + {COHESION_KEYWORDS}
              </div>
            )}
          </Section>

          <Section title="➕ 額外補充關鍵字" hint="自由輸入特殊風格描述，會附加到 Style prompt">
            <textarea
              value={extra}
              onChange={e => setExtra(e.target.value)}
              rows={2}
              placeholder="例：90s style, retro synth, japanese city pop influence"
              className="w-full px-3 py-2 rounded-md border border-slate-300 bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm"
            />
          </Section>

          <Section title="🧱 段落結構" hint="選擇骨架後可自由增刪、調整段落內容；段落描述用英文 v5.5 反應較準">
            <div className="mb-3">
              <SingleSelect options={STRUCTURE_TEMPLATES} value={structureName} onChange={applyStructure} />
            </div>

            <div className="space-y-3">
              {sections.map((sec, idx) => (
                <div key={idx} className="border border-slate-200 rounded-lg p-3 bg-slate-50">
                  <div className="flex gap-2 mb-2 items-center">
                    <input
                      type="text"
                      value={sec.tag}
                      onChange={e => updateSection(idx, "tag", e.target.value)}
                      className="px-2 py-1 text-sm font-semibold rounded border border-slate-300 bg-white w-32"
                      placeholder="Verse"
                    />
                    <input
                      type="text"
                      value={sec.desc}
                      onChange={e => updateSection(idx, "desc", e.target.value)}
                      className="flex-1 px-2 py-1 text-xs rounded border border-slate-300 bg-white text-slate-600"
                      placeholder="段落描述（英文，例：rising tension, drums building）"
                    />
                    <button onClick={() => moveSection(idx, -1)} className="text-slate-400 hover:text-slate-700 px-1" title="上移">↑</button>
                    <button onClick={() => moveSection(idx, 1)} className="text-slate-400 hover:text-slate-700 px-1" title="下移">↓</button>
                    <button onClick={() => removeSection(idx)} className="text-rose-400 hover:text-rose-600 px-1" title="刪除">✕</button>
                  </div>
                  <textarea
                    value={sec.lyrics}
                    onChange={e => updateSection(idx, "lyrics", e.target.value)}
                    rows={3}
                    placeholder="輸入歌詞（中文/英文皆可，留空為純樂器段）"
                    className="w-full px-2 py-1.5 text-sm rounded border border-slate-300 bg-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-200 outline-none"
                  />
                  <div className="text-xs text-slate-400 mt-1 flex justify-between">
                    <span>{sec.lyrics.length} 字</span>
                    <span>{sec.lyrics.split('\n').filter(l => l.trim()).length} 行</span>
                  </div>
                </div>
              ))}
              <button
                onClick={addSection}
                className="w-full py-2 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 hover:border-indigo-400 hover:text-indigo-600 text-sm"
              >
                + 新增段落
              </button>
            </div>
            <div className="text-xs text-slate-500 mt-3">
              總字數: <span className="font-semibold text-slate-700">{totalLyricsChars}</span> ｜ 段落數: <span className="font-semibold text-slate-700">{sections.length}</span>
            </div>
          </Section>
        </div>

        {/* 右欄：輸出 */}
        <div className="lg:col-span-5">
          <div className="lg:sticky lg:top-4">

            <Section title="📤 Style Prompt" hint="複製到 Suno 的 Style 欄位｜v5.5 上限約 1000 字元">
              <textarea
                value={stylePrompt}
                readOnly
                rows={7}
                className="w-full p-3 rounded-md border border-slate-300 bg-slate-50 text-sm font-mono"
              />
              <div className="flex justify-between items-center mt-2 text-xs">
                <div className="space-x-2">
                  <span className={styleWarn ? "text-rose-600 font-semibold" : "text-slate-500"}>
                    {stylePrompt.length} 字元 {styleWarn && "（超過 1000，請精簡）"}
                  </span>
                  <span className={tagWarn ? "text-amber-600" : "text-slate-500"}>
                    · {tagCount} tags {tagWarn && "（建議 8-15 個）"}
                  </span>
                </div>
                <button
                  onClick={() => copy(stylePrompt, "style")}
                  className={`px-4 py-1.5 rounded-md text-sm font-medium ${
                    copied.style ? "bg-emerald-600 text-white" : "bg-indigo-600 text-white hover:bg-indigo-700"
                  }`}
                >
                  {copied.style ? "✓ 已複製" : "複製 Style"}
                </button>
              </div>
            </Section>

            <Section title="📝 Lyrics" hint="複製到 Suno 的 Lyrics 欄位">
              <textarea
                value={lyricsPrompt}
                readOnly
                rows={14}
                className="w-full p-3 rounded-md border border-slate-300 bg-slate-50 text-sm font-mono whitespace-pre-wrap"
              />
              <div className="flex justify-between items-center mt-2">
                <span className="text-xs text-slate-500">{lyricsPrompt.length} 字元</span>
                <button
                  onClick={() => copy(lyricsPrompt, "lyrics")}
                  className={`px-4 py-1.5 rounded-md text-sm font-medium ${
                    copied.lyrics ? "bg-emerald-600 text-white" : "bg-indigo-600 text-white hover:bg-indigo-700"
                  }`}
                >
                  {copied.lyrics ? "✓ 已複製" : "複製 Lyrics"}
                </button>
              </div>
            </Section>

            <Section title="📦 完整 Prompt（含標題與分隔）">
              <textarea
                value={fullPrompt}
                readOnly
                rows={8}
                className="w-full p-3 rounded-md border border-slate-300 bg-slate-50 text-xs font-mono"
              />
              <div className="flex justify-end mt-2">
                <button
                  onClick={() => copy(fullPrompt, "full")}
                  className={`px-4 py-1.5 rounded-md text-sm font-medium ${
                    copied.full ? "bg-emerald-600 text-white" : "bg-slate-700 text-white hover:bg-slate-800"
                  }`}
                >
                  {copied.full ? "✓ 已複製" : "複製完整版"}
                </button>
              </div>
            </Section>

            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-xs text-amber-900 leading-relaxed">
              <div className="font-semibold mb-2">💡 Suno v5.5 Prompt 心法</div>
              <ul className="list-disc list-inside space-y-1">
                <li><strong>四層架構</strong>：Tempo+Key → 樂器 → 人聲 → 製作紋理</li>
                <li><strong>Negative Prompt 必加</strong>：no autotune / no synths 等</li>
                <li><strong>具體形容詞</strong>：fingerpicked guitar 比 guitar 強很多</li>
                <li><strong>Style 控制 1000 字內</strong>，tag 數 8-15 個最佳</li>
                <li><strong>Subgenre &gt; 廣義 Genre</strong>：synthwave 比 electronic 準</li>
                <li>切割感明顯時用 Inpaint 或 Extend 修補接點</li>
                <li>啟用 Voice Clone 時略過人聲描述，避免衝突</li>
                <li>歌詞段落 [tag] 用英文，內容可用中文</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <footer className="mt-8 text-center text-xs text-slate-400">
        Suno Prompt Generator · v5.5 Optimized · {new Date().getFullYear()}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
